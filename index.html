<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.tailwindcss.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://lrclib.net https://lyrics-api.boidu.dev https://apic-desktop.musixmatch.com https://music.xianqiao.wang https://generativelanguage.googleapis.com https://api.github.com; img-src 'self' data: blob:; media-src 'self' blob: file:;">
    <title>Lumina Music Player</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #ffffff;
            --accent-glow: rgba(255, 255, 255, 0.15);
            --bg: #050505;
            --bg-secondary: #0a0a0a;
            --border: rgba(255, 255, 255, 0.08);
            --border-hover: rgba(255, 255, 255, 0.15);
        }
        body {
            font-family: 'Be Vietnam Pro', sans-serif;
            background-color: var(--bg);
            color: #ffffff;
            overflow: hidden;
            height: 100vh;
            margin: 0;
        }
        /* Subtle background pattern */
        .app-bg {
            background: 
                radial-gradient(ellipse at 20% 0%, rgba(40, 40, 45, 0.4) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 100%, rgba(30, 30, 35, 0.3) 0%, transparent 50%),
                var(--bg);
        }
        .border-thin {
            border: 1px solid var(--border);
        }
        .lyrics-scroll {
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        .lyrics-scroll::-webkit-scrollbar {
            display: none;
        }
        /* Enhanced Lyrics Styling */
        /* Enhanced Lyrics Styling - Apple Music Style (Performance Optimized) */
        .lyric-item {
            position: relative;
            transition-property: transform, opacity, color, text-shadow;
            transition-duration: 760ms, 680ms, 260ms, 260ms;
            transition-timing-function: cubic-bezier(0.16, 1, 0.3, 1), ease-out, ease-out, ease-out;
            transition-delay: 0ms, 0ms, 0ms, 0ms;
            opacity: 0.45;
            padding: 1rem 2rem;
            margin: 0.5rem 0;
            border-radius: 12px;
            transform: scale(0.98) translateZ(0); /* GPU layer */
            transform-origin: left center;
            backface-visibility: hidden;
            font-weight: 700;
            font-size: 2.25rem;
            line-height: 1.3;
            letter-spacing: 0;
            color: #ffffff;
            cursor: pointer;
            contain: layout paint style;
        }
        .lyric-item:hover {
            opacity: 0.7;
            background: rgba(255, 255, 255, 0.03);
        }
        /* Active lyric - karaoke style */
        .lyric-item.active-lyric {
            opacity: 1;
            transform: scale(1.05) translateZ(0);
            font-weight: 600;
            color: #ffffff;
            text-shadow: 0 0 12px rgba(255, 255, 255, 0.28);
            will-change: transform, opacity;
        }
        .lyric-item.lyric-light-in {
            transition-duration: 760ms, 680ms, 440ms, 540ms;
            transition-delay: 0ms, 0ms, 180ms, 220ms;
        }
        .lyric-item.lyric-just-passed {
            transition-duration: 620ms, 420ms, 180ms, 180ms;
            transition-delay: 0ms, 0ms, 0ms, 0ms;
        }
        .lyric-item.active-lyric::before {
            display: none;
        }
        .lyric-item.near-active {
            transform: scale(1) translateZ(0);
            opacity: 0.75;
        }
        .lyric-item.near-active-1 {
            opacity: 0.65;
        }
        .lyric-item.near-active-2 {
            opacity: 0.55;
        }
        /* Upcoming lyrics slightly brighter */
        .lyric-item.upcoming {
            opacity: 0.2;
        }
        /* Plain lyrics styling */
        .plain-lyric {
            padding: 0.5rem 0;
            line-height: 1.8;
            opacity: 0.5;
            transition: opacity 0.3s ease;
        }
        .plain-lyric:hover {
            opacity: 0.8;
        }
        /* Lyrics container gradient overlays */
        /* Removed fade overlays */
        .lyrics-fade-top, .lyrics-fade-bottom {
            display: none;
        }
        input[type="range"] {
            -webkit-appearance: none;
            background: transparent;
            cursor: pointer;
        }
        input[type="range"]::-webkit-slider-runnable-track {
            background: rgba(255,255,255,0.15);
            height: 4px;
            border-radius: 2px;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 12px;
            width: 12px;
            background: #fff;
            border-radius: 50%;
            margin-top: -4px;
            transition: transform 0.1s ease;
        }
        input[type="range"]:hover::-webkit-slider-thumb {
            transform: scale(1.2);
        }
        input[type="range"]::-moz-range-track {
            background: rgba(255,255,255,0.15);
            height: 4px;
            border-radius: 2px;
        }
        input[type="range"]::-moz-range-thumb {
            height: 12px;
            width: 12px;
            background: #fff;
            border-radius: 50%;
            border: none;
        }
        .square-btn {
            background: transparent;
            border: 1px solid var(--border);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .square-btn:hover {
            background: #fff !important;
            color: #000 !important;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
        }
        /* Play button glow effect */
        .play-btn {
            position: relative;
            background: linear-gradient(135deg, #fff 0%, #e0e0e0 100%);
            color: #000;
            border: none;
        }
        .play-btn::before {
            content: '';
            position: absolute;
            inset: -2px;
            background: linear-gradient(135deg, rgba(255,255,255,0.3) 0%, transparent 50%);
            border-radius: inherit;
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: -1;
        }
        .play-btn:hover::before {
            opacity: 1;
        }
        .play-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.2);
        }
        /* Playlist item - optimized for scroll performance */
        .playlist-item {
            position: relative;
            background: transparent;
            border: 1px solid var(--border);
            /* Reduced: only transition background on hover */
            transition: background-color 0.15s ease;
            overflow: hidden;
            contain: layout style paint;
        }
        .playlist-item:hover {
            background: rgba(255, 255, 255, 0.05);
        }
        .playlist-item.active {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.2);
        }
        /* New Compact Playing Indicator */
        .playing-indicator-v2 {
            display: flex;
            gap: 2px;
            align-items: flex-end;
            height: 10px;
        }
        .playing-indicator-v2 span {
            width: 2px;
            background: #f1c40f;
            border-radius: 1px;
            animation: equalizer-v2 0.8s ease-in-out infinite;
        }
        .playing-indicator-v2 span:nth-child(1) { animation-delay: 0s; }
        .playing-indicator-v2 span:nth-child(2) { animation-delay: 0.2s; }
        .playing-indicator-v2 span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes equalizer-v2 {
            0%, 100% { height: 3px; }
            50% { height: 10px; }
        }
        /* Progress bar glow */
        .progress-bar {
            position: relative;
        }
        .progress-bar-fill {
            background: linear-gradient(90deg, rgba(255,255,255,0.8) 0%, #fff 100%);
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }
        /* Loading animation */
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        /* Pulse animation for playing indicator */
        .playing-indicator {
            display: flex;
            gap: 2px;
            align-items: flex-end;
            height: 12px;
        }
        .playing-indicator span {
            width: 3px;
            background: #fff;
            border-radius: 1px;
            animation: equalizer 0.8s ease-in-out infinite;
        }
        .playing-indicator span:nth-child(1) { animation-delay: 0s; }
        .playing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .playing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes equalizer {
            0%, 100% { height: 4px; }
            50% { height: 12px; }
        }
        /* Glassmorphism header */
        .glass-header {
            background: rgba(5, 5, 5, 0.2);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        /* Stagger animation for list items */
        @keyframes fadeSlideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .stagger-item {
            animation: fadeSlideIn 0.4s ease forwards;
            opacity: 0;
        }
        /* Line clamp for song title */
        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        /* Hide all scrollbars */
        .hide-scrollbar {
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        /* Album cover styling */
        .album-cover-container {
            position: relative;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .album-cover-container:hover {
            transform: scale(1.02);
        }
        .album-cover {
            box-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.5),
                0 0 0 1px rgba(255, 255, 255, 0.05);
            transition: box-shadow 0.4s ease;
        }
        .album-cover:hover {
            box-shadow: 
                0 16px 48px rgba(0, 0, 0, 0.6),
                0 0 0 1px rgba(255, 255, 255, 0.1),
                0 0 60px rgba(255, 255, 255, 0.03);
        }
        /* Dynamic Apple Music style player background */
        .lumina-ambient-background {
            background:
                linear-gradient(125deg, var(--cover-bg-shadow), var(--cover-bg-base) 42%, var(--cover-bg-primary));
            isolation: isolate;
        }
        .lumina-cover-field,
        .lumina-cover-wash {
            position: absolute;
            inset: -18%;
            width: 136%;
            height: 136%;
            object-fit: cover;
            pointer-events: none;
            user-select: none;
            will-change: transform, opacity;
        }
        .lumina-cover-field {
            opacity: 0.58;
            filter: blur(96px) saturate(2.15) brightness(0.72);
            transform: scale(1.22) translate3d(-1.5%, -1%, 0);
            animation: lumina-cover-drift 24s ease-in-out infinite alternate;
            animation-play-state: paused;
        }
        .lumina-cover-wash {
            inset: -28%;
            width: 156%;
            height: 156%;
            opacity: 0.34;
            mix-blend-mode: screen;
            filter: blur(150px) saturate(2.65) contrast(1.08);
            transform: scale(1.18) rotate(4deg) translate3d(2%, 1%, 0);
            animation: lumina-cover-wash 32s ease-in-out infinite alternate;
            animation-play-state: paused;
        }
        .lumina-ambient-mesh {
            position: absolute;
            inset: -10%;
            background:
                radial-gradient(120% 90% at 15% 18%, var(--cover-bg-glow) 0%, transparent 56%),
                radial-gradient(95% 82% at 82% 24%, var(--cover-bg-secondary) 0%, transparent 62%),
                radial-gradient(110% 90% at 48% 92%, var(--cover-bg-accent) 0%, transparent 58%),
                linear-gradient(140deg, var(--cover-bg-shadow), var(--cover-bg-base) 46%, var(--cover-bg-primary));
            filter: blur(18px) saturate(1.35);
            opacity: 0.72;
            mix-blend-mode: overlay;
            transform: scale(1.05);
            animation: lumina-mesh-flow 28s ease-in-out infinite alternate;
            animation-play-state: paused;
            will-change: transform, opacity;
        }
        .lumina-ambient-depth {
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse at center, rgba(255,255,255,0.05) 0%, rgba(0,0,0,0.08) 38%, rgba(0,0,0,0.66) 100%),
                linear-gradient(90deg, rgba(0,0,0,0.22), rgba(0,0,0,0.04) 45%, rgba(0,0,0,0.28)),
                linear-gradient(180deg, rgba(0,0,0,0.24), transparent 34%, rgba(0,0,0,0.58));
        }
        .lumina-ambient-grain {
            position: absolute;
            inset: 0;
            pointer-events: none;
            opacity: 0.04;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            background-repeat: repeat;
            background-size: 150px 150px;
        }
        .lumina-ambient-readability {
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse at 26% 48%, rgba(0,0,0,0.08) 0%, transparent 42%),
                radial-gradient(ellipse at 75% 42%, rgba(0,0,0,0.04) 0%, rgba(0,0,0,0.42) 78%),
                linear-gradient(180deg, transparent 0%, rgba(0,0,0,0.18) 62%, rgba(0,0,0,0.52) 100%);
        }
        .lumina-ambient-playing .lumina-cover-field,
        .lumina-ambient-playing .lumina-cover-wash,
        .lumina-ambient-playing .lumina-ambient-mesh {
            animation-play-state: running;
        }
        @keyframes lumina-cover-drift {
            0% {
                transform: scale(1.22) translate3d(-2%, -1%, 0) rotate(-1deg);
            }
            100% {
                transform: scale(1.3) translate3d(2%, 1.5%, 0) rotate(2deg);
            }
        }
        @keyframes lumina-cover-wash {
            0% {
                transform: scale(1.18) rotate(4deg) translate3d(2%, 1%, 0);
                opacity: 0.26;
            }
            100% {
                transform: scale(1.28) rotate(-3deg) translate3d(-2%, -1%, 0);
                opacity: 0.42;
            }
        }
        @keyframes lumina-mesh-flow {
            0% {
                transform: scale(1.04) translate3d(-1%, 0, 0);
                opacity: 0.64;
            }
            100% {
                transform: scale(1.11) translate3d(1.4%, -1%, 0);
                opacity: 0.82;
            }
        }
        @media (prefers-reduced-motion: reduce) {
            .lumina-cover-field,
            .lumina-cover-wash,
            .lumina-ambient-mesh,
            .lyric-item {
                animation: none !important;
                transition-duration: 0.01ms !important;
            }
        }
        /* Vinyl record effect behind cover */
        .vinyl-record {
            position: absolute;
            width: 95%;
            height: 95%;
            background: radial-gradient(circle at center,
                #1a1a1a 0%,
                #0d0d0d 30%,
                #1a1a1a 31%,
                #0d0d0d 50%,
                #1a1a1a 51%,
                #0d0d0d 70%,
                #1a1a1a 71%,
                #0d0d0d 100%
            );
            border-radius: 50%;
            right: -30%;
            top: 50%;
            transform: translateY(-50%);
            z-index: -1;
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .vinyl-record::before {
            content: '';
            position: absolute;
            width: 30%;
            height: 30%;
            background: #0a0a0a;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: inset 0 0 10px rgba(255,255,255,0.1);
        }
        .album-cover-container:hover .vinyl-record {
            opacity: 0.6;
            right: -40%;
        }
        /* Playing animation for vinyl */
        @keyframes spin-vinyl {
            from { transform: translateY(-50%) rotate(0deg); }
            to { transform: translateY(-50%) rotate(360deg); }
        }
        .vinyl-spinning {
            animation: spin-vinyl 4s linear infinite;
        }

        /* Album Grid Styles */
        .album-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 1.5rem;
        }
        @media (min-width: 768px) {
            .album-grid {
                grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            }
        }
        /* Album card - optimized for scroll performance */
        .album-card {
            /* Removed hover transform for scroll performance */
            contain: layout style paint;
        }
        .album-card-cover {
            position: relative;
            aspect-ratio: 1;
            border-radius: 8px;
            overflow: hidden;
            background: var(--bg-secondary);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        }
        .album-card-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.15s ease;
        }
        .album-card:hover .album-card-overlay {
            opacity: 1;
        }
        .album-card-overlay svg {
            filter: drop-shadow(0 2px 8px rgba(0, 0, 0, 0.5));
        }
        .album-card.album-playing {
            position: relative;
        }
        .album-card.album-playing .album-card-cover {
            box-shadow: 0 4px 20px rgba(255, 255, 255, 0.15), 0 0 0 2px rgba(255, 255, 255, 0.3);
        }
        .album-card.album-playing .playing-indicator {
            background: rgba(0, 0, 0, 0.6);
            padding: 6px 8px;
            border-radius: 6px;
        }

        /* Artist Item - optimized for scroll performance */
        .artist-item {
            position: relative;
            background: transparent;
            border: 1px solid var(--border);
            transition: background-color 0.15s ease;
            overflow: hidden;
            contain: layout style paint;
        }
        .artist-item:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        /* Performance optimizations for Electron Windows */
        .virtual-list-item {
            content-visibility: auto;
            contain-intrinsic-size: 0 72px;
        }
        /* Optimize scrolling containers */
        .lyrics-scroll {
            -webkit-overflow-scrolling: touch;
            will-change: scroll-position;
        }
        /* Global performance hints */
        * {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Shimmer disabled - using static placeholder for performance */
        .shimmer-effect {
            display: none;
        }
        /* Custom Popup Animation */
        @keyframes slideUpFade {
            from {
                opacity: 0;
                transform: translate(-50%, 10px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translate(-50%, 0) scale(1);
            }
        }
        .popup-animate {
            animation: slideUpFade 0.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            transform-origin: bottom center;
        }
    </style>
</head>
<body>
    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
